; openevse-16mb-migrator
; In-system migration of a 16MB ESP32 from the OpenEVSE 4MB layout to the 16MB
; layout, leaving a WORKING OpenEVSE-16MB install. A tiny ESP-IDF app that does
; the protected-region commit (bootloader 0x1000 + partition table 0x8000 +
; otadata) that PR #1136 needs but its Arduino build can't perform. See README.

[env:esp32dev]
platform = espressif32@6.12.0
board = esp32dev
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
; 16MB so esp_flash can reach the staged app at 0x650000 and the whole chip.
board_upload.flash_size = 16MB
; "Before" layout: boots the migrator (factory @0x10000); nvs @0x9000 preserved.
board_build.partitions = partitions_start.csv
